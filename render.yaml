services:
  - type: web
    name: online-backgammon
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: nardy-data
      mountPath: /var/data
      sizeGB: 1
